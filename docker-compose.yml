version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: voice-banking-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-voice_banking}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - voice-banking-network

  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    container_name: voice-banking-user
    restart: unless-stopped
    env_file:
      - ./services/user-service/.env
    ports:
      - "${USER_SERVICE_PORT:-8007}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - voice-banking-network

  banking-core:
    build:
      context: ./services/banking-core
      dockerfile: Dockerfile
    container_name: voice-banking-core
    restart: unless-stopped
    env_file:
      - ./services/banking-core/.env
    ports:
      - "${BANKING_CORE_PORT:-8002}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - voice-banking-network

  voice-service:
    build:
      context: ./services/voice-service
      dockerfile: Dockerfile
    container_name: voice-banking-voice
    restart: unless-stopped
    env_file:
      - ./services/voice-service/.env
    ports:
      - "${VOICE_SERVICE_PORT:-8003}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - voice-banking-network
      

  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    container_name: voice-banking-notification
    restart: unless-stopped
    env_file:
      - ./services/notification-service/.env
    ports:
      - "${NOTIFICATION_SERVICE_PORT:-8004}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - voice-banking-network

  audit-service:
    build:
      context: ./services/audit-service
      dockerfile: Dockerfile
    container_name: voice-banking-audit
    restart: unless-stopped
    env_file:
      - ./services/audit-service/.env
    ports:
      - "${AUDIT_SERVICE_PORT:-8005}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - voice-banking-network

  # stt-service:
  #   build:
  #     context: ./services/stt-service
  #     dockerfile: Dockerfile
  #   container_name: voice-banking-stt
  #   restart: unless-stopped
  #   env_file:
  #     - ./services/stt-service/.env
  #   ports:
  #     - "${STT_SERVICE_PORT:-8006}:8000"
  #   healthcheck:
  #     test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3
  #     start_period: 40s
  #   networks:
  #     - voice-banking-network

  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: voice-banking-gateway
    restart: unless-stopped
    env_file:
      - ./services/api-gateway/.env
    ports:
      - "${API_GATEWAY_PORT:-8000}:8000"
    depends_on:
      user-service:
        condition: service_healthy
      banking-core:
        condition: service_healthy
      voice-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      audit-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - voice-banking-network

  voice-db:
    image: ankane/pgvector
    container_name: voice-banking-voice-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: voice_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    networks:
      - voice-banking-network

volumes:
  postgres_data:
    driver: local

networks:
  voice-banking-network:
    driver: bridge
